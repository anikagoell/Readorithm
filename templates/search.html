<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Readorithm</title>
    <link rel="icon" type="image/png" href="/static/favi.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        body {
            background-color: #0b1327f3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Navbar */
        .navbar {
            background-color: #040d1f;
            padding: 20px 30px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.4);
        }

        .title {
            color: #ffffff;
            font-size: 30px;
            font-weight: 600;
        }

        .navlink {
            color: #ffffff;
            text-decoration: none;
            margin-left: 25px;
            font-size: 17px;
            transition: 0.3s ease;
        }

        .navlink:hover {
            color: #898fd1f0;
        }

        .navlink.active {
            color: #898fd1f0;
            font-weight: 600;
            border-bottom: 2px solid #898fd1f0;
            padding-bottom: 3px;
            font-size: 18px;
        }

       
        footer {
            margin-top: 100px;
            margin-bottom: 0;
            padding: 20px;
            text-align: center;
            color: #cbd5e1;
            background-color: #040d1f;
            border-top: 1px solid #1e293b;
        }
        .logo {
            height: 45px;
            width: auto;
        }

        input.book{
            width: 100%;
            max-width: 600px;
            padding: 10px 15px;
            font-size: 16px;
            border: none;
            border-radius: 9px;
            box-shadow: 4px 4px 15px rgba(0, 0, 0, 0.79);
            margin: 50px auto;
            display: block;
        }
        input.btn{
            display: block;
            margin: 15px auto;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            background-color: #0ecbece2;
            border: none;
            border-radius: 17px;
            box-shadow: 2px 6px 15px rgba(0, 0, 0, 0.9);
            cursor: pointer;
            transition: 0.3s ease;
        }
        input.btn:hover {
            background-color: #0e899fe2;
            color: #ffffff;
            font-weight: 400;
            box-shadow: 4px 8px 20px rgba(0, 0, 0, 0.9);
        }
        .col-md-3 {
            transition: transform 0.3s ease, box-shadow 0.4s ease;
        }

        .col-md-3:hover {
            transform: translateY(-12px) scale(1.08);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.79);
        }
        form{
            margin-top:5px;
        }
        
        

    </style>
</head>

<body>

    <nav class="navbar d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <img src="/static/favi.png" alt="Readorithm Logo" class="logo">
            <span class="title ms-2">Readorithm</span>
        </div>        
        <div>
            <a class="navlink " href="/">Home</a>
            <a class="navlink" href="/top60">Top Books</a>
            <a class="navlink active" href="/search">Search</a>
            <a class="navlink " href="/contact">Contact</a>
        </div>
    </nav>
    <p style="text-align:center; color:#ffffff; margin-top:30px;">Search for your favorite book and get recommendations!</p>
    <form method="POST" action="/searchbook"> 
        <input name="bookname" type="text" class="book" placeholder="Search with Book Name">
        <input type="submit" class="btn btn-lg btn-warning" value="Search">
    </form>

    {% if data %}
    <div class="container mt-4">
        <div class="row g-4 justify-content-center">
            {% for i in data %}
            <div class="col-md-3">
                <div class="card h-100 shadow" style="border: none; transition: transform 0.3s ease, box-shadow 0.4s ease;">
                    <div class="card-body text-center" style="background-color: #ffffffd4; color: #020c17;">
                        <img class="card-img-top mb-3" src="{{i[2]}}" alt="Book Cover" style="height:250px; width:auto; ">
                        <h6 class="card-title">{{i[0]}}</h6>
                        <p class="card-text mb-1">{{i[1]}}</p>
                        <p class="card-text">{{i[3]}}</p>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
{% endif %}
        

    

    <footer>
        © 2026 Readorithm. All rights reserved.
    </footer>

</body>
</html>
